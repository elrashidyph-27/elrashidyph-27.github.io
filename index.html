<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antiplatelet Therapy — Clinical eLearning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3260;
    --blue: #1e5fa8;
    --accent: #e8a020;
    --accent2: #3dbfa0;
    --light: #f4f7fc;
    --white: #ffffff;
    --text: #1a2540;
    --muted: #6b7a99;
    --correct: #1daa7a;
    --wrong: #d94040;
    --card-bg: #ffffff;
    --border: #dde3f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── SCREEN CONTAINER ── */
  #app {
    width: 100%;
    max-width: 820px;
    min-height: 520px;
    position: relative;
  }

  .screen {
    display: none;
    animation: fadeUp .45s ease both;
  }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── COVER ── */
  #cover {
    background: linear-gradient(145deg, var(--navy-mid), var(--navy));
    border-radius: 20px;
    padding: 64px 56px;
    text-align: center;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    position: relative;
    overflow: hidden;
  }
  #cover::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,160,32,.18) 0%, transparent 70%);
  }
  #cover::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,191,160,.12) 0%, transparent 70%);
  }
  .cover-badge {
    display: inline-block;
    background: rgba(232,160,32,.18);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 30px;
    border: 1px solid rgba(232,160,32,.3);
    margin-bottom: 28px;
  }
  #cover h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 16px;
  }
  #cover h1 em { color: var(--accent); font-style: italic; }
  #cover p.subtitle {
    color: rgba(255,255,255,.6);
    font-size: 16px;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto 36px;
  }
  .cover-meta {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 44px;
  }
  .cover-meta span {
    color: rgba(255,255,255,.5);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cover-meta span::before { font-size: 16px; }
  .cover-meta .m-sections::before { content: '📋'; }
  .cover-meta .m-quiz::before    { content: '🧠'; }
  .cover-meta .m-time::before    { content: '⏱'; }

  /* ── PROGRESS BAR ── */
  #progress-bar-wrap {
    background: var(--navy-mid);
    border-radius: 20px 20px 0 0;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid rgba(255,255,255,.08);
    border-bottom: none;
  }
  #progress-label { color: rgba(255,255,255,.55); font-size: 12px; flex-shrink: 0; }
  #progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,.1);
    border-radius: 10px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width .5s ease;
    width: 0%;
  }
  #progress-pct { color: var(--accent); font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* ── SLIDE CARD ── */
  .slide-card {
    background: var(--card-bg);
    border-radius: 0 0 20px 20px;
    padding: 44px 48px 36px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    min-height: 420px;
    display: flex;
    flex-direction: column;
  }

  .section-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    background: rgba(30,95,168,.08);
    border: 1px solid rgba(30,95,168,.2);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 18px;
  }

  .slide-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 20px;
    line-height: 1.25;
  }

  .slide-card p, .slide-card li {
    font-size: 15.5px;
    line-height: 1.75;
    color: #344060;
  }

  .slide-card ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
  }
  .slide-card ul li {
    padding: 10px 14px 10px 38px;
    position: relative;
    margin-bottom: 8px;
    background: var(--light);
    border-radius: 10px;
    border-left: 3px solid var(--blue);
  }
  .slide-card ul li::before {
    content: '▸';
    position: absolute;
    left: 14px;
    color: var(--blue);
    font-size: 13px;
  }

  /* highlight box */
  .info-box {
    background: linear-gradient(135deg, rgba(30,95,168,.06), rgba(61,191,160,.06));
    border: 1px solid rgba(30,95,168,.15);
    border-left: 4px solid var(--blue);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 18px;
    font-size: 14.5px;
    color: var(--navy-mid);
    line-height: 1.65;
  }
  .info-box strong { color: var(--blue); }

  .warn-box {
    background: rgba(232,160,32,.07);
    border: 1px solid rgba(232,160,32,.25);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 18px;
    font-size: 14.5px;
    color: #5a3c00;
    line-height: 1.65;
  }

  .table-wrap { margin-top: 18px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    background: var(--navy);
    color: white;
    padding: 12px 16px;
    text-align: left;
    font-weight: 500;
    font-size: 13px;
  }
  tbody td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }
  tbody tr:nth-child(even) td { background: var(--light); }
  tbody tr:hover td { background: rgba(30,95,168,.04); }

  /* ── QUIZ ── */
  .quiz-q {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--navy);
    line-height: 1.35;
    margin-bottom: 24px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--light);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
    text-align: left;
    transition: all .2s ease;
    font-family: 'DM Sans', sans-serif;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: rgba(30,95,168,.05);
    transform: translateX(4px);
  }
  .option-btn .opt-letter {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .2s;
  }
  .option-btn.correct {
    background: rgba(29,170,122,.1);
    border-color: var(--correct);
  }
  .option-btn.correct .opt-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .option-btn.wrong {
    background: rgba(217,64,64,.08);
    border-color: var(--wrong);
  }
  .option-btn.wrong .opt-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.6;
    margin-top: 4px;
    display: none;
  }
  .feedback-box.show { display: block; animation: fadeUp .3s ease; }
  .feedback-box.correct-fb { background: rgba(29,170,122,.1); color: #0d6648; border: 1px solid rgba(29,170,122,.25); }
  .feedback-box.wrong-fb   { background: rgba(217,64,64,.08);  color: #8b1a1a; border: 1px solid rgba(217,64,64,.2); }

  /* ── NAVIGATION ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 28px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s ease;
  }
  .btn-primary {
    background: var(--navy);
    color: white;
  }
  .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), #f0b030);
    color: var(--navy);
    font-size: 16px;
    padding: 15px 42px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(232,160,32,.35);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(232,160,32,.4); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--light); color: var(--text); }
  .btn:disabled { opacity: .4; cursor: default; transform: none !important; }

  .slide-counter { font-size: 13px; color: var(--muted); }

  /* ── RESULTS ── */
  #results {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 56px 48px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .score-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--accent) var(--score-deg), var(--light) var(--score-deg));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }
  .score-ring::after {
    content: '';
    position: absolute;
    width: 90px; height: 90px;
    background: white;
    border-radius: 50%;
  }
  .score-num {
    position: relative;
    z-index: 1;
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
  }
  #results h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
    margin-bottom: 12px;
  }
  #results p { color: var(--muted); font-size: 16px; margin-bottom: 32px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
  }
  .stat-box {
    background: var(--light);
    border-radius: 14px;
    padding: 18px 28px;
    min-width: 100px;
  }
  .stat-box .stat-n { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--navy); }
  .stat-box .stat-l { font-size: 12px; color: var(--muted); margin-top: 2px; }

  @media (max-width: 600px) {
    .slide-card, #cover { padding: 28px 22px; }
    #cover h1 { font-size: 28px; }
    .cover-meta { flex-wrap: wrap; gap: 14px; }
    .quiz-q { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- COVER -->
  <div class="screen active" id="cover-screen">
    <div id="cover">
      <div class="cover-badge">CME eLearning Module</div>
      <h1>Antiplatelet Therapy<br>in <em>Stroke & ACS</em></h1>
      <p class="subtitle">A clinical guide to antiplatelet strategies — from acute ischemic stroke management to dual antiplatelet therapy in acute coronary syndromes.</p>
      <div class="cover-meta">
        <span class="m-sections">3 Sections</span>
        <span class="m-quiz">6 Quiz Questions</span>
        <span class="m-time">~10 min</span>
      </div>
      <button class="btn btn-start" onclick="startCourse()">Begin Course →</button>
    </div>
  </div>

  <!-- COURSE -->
  <div class="screen" id="course-screen">
    <div id="progress-bar-wrap">
      <span id="progress-label">Progress</span>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <span id="progress-pct">0%</span>
    </div>
    <div class="slide-card" id="slide-card">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="results-screen">
    <div id="results">
      <div class="score-ring" id="score-ring">
        <div class="score-num" id="score-num">0%</div>
      </div>
      <h2 id="result-title">Module Complete!</h2>
      <p id="result-msg"></p>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-n" id="r-correct">0</div><div class="stat-l">Correct</div></div>
        <div class="stat-box"><div class="stat-n" id="r-total">0</div><div class="stat-l">Questions</div></div>
      </div>
      <button class="btn btn-primary" onclick="restartCourse()">↩ Restart Course</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
//  COURSE DATA
// ═══════════════════════════════════════════════
const slides = [

  // ── SECTION 1: AIS & ASPIRIN ──────────────────

  { type: 'section-intro', section: 'Section 1', title: 'Aspirin in Acute Ischemic Stroke (AIS)', body: `
    <p>Aspirin remains the cornerstone of early antiplatelet therapy following acute ischemic stroke. Understanding <em>when</em> and <em>how</em> to initiate it — especially in the context of IV thrombolysis — is critical to patient outcomes.</p>
    <div class="info-box"><strong>Key principle:</strong> Timing of aspirin initiation depends on whether the patient received IV alteplase (tPA).</div>
  `},

  { type: 'slide', section: 'Section 1', title: 'Standard Aspirin Recommendation in AIS', body: `
    <p>Administration of aspirin is <strong>recommended in patients with AIS within 24 to 48 hours after onset.</strong></p>
    <ul>
      <li>Reduces risk of early recurrent stroke</li>
      <li>Supported by large randomized trials (IST, CAST)</li>
      <li>Should not be delayed unnecessarily in non-tPA patients</li>
    </ul>
    <div class="info-box"><strong>Note:</strong> This applies broadly to non-cardioembolic ischemic strokes where anticoagulation is not immediately indicated.</div>
  `},

  { type: 'slide', section: 'Section 1', title: 'Aspirin After IV Alteplase (tPA)', body: `
    <p>When a patient receives IV alteplase, aspirin administration is <strong>generally delayed until 24 hours later.</strong></p>
    <div class="warn-box">⚠️ Early aspirin post-tPA increases bleeding risk. The 24-hour delay allows monitoring for hemorrhagic transformation before adding antiplatelet therapy.</div>
    <div class="info-box"><strong>Exception:</strong> Aspirin may be considered earlier if there is a concomitant condition where:
    <ul style="margin-top:10px">
      <li>Withholding aspirin would cause <em>substantial risk</em>, or</li>
      <li>Aspirin would provide <em>substantial benefit</em> even without tPA</li>
    </ul>
    </div>
  `},

  { type: 'quiz', section: 'Section 1 — Quiz', question: 'A patient presents with AIS and receives IV alteplase. When should aspirin generally be started?', options: [
    { text: 'Immediately at presentation', correct: false },
    { text: 'Within 6 hours of onset', correct: false },
    { text: '24 hours after alteplase administration', correct: true },
    { text: '48–72 hours post-onset', correct: false },
  ], explanation: 'Correct! Aspirin is generally delayed 24 hours post-alteplase to reduce hemorrhagic risk. Earlier initiation may be considered only if specific high-risk concomitant conditions exist.' },

  // ── SECTION 2: DAPT IN MINOR STROKE ─────────────

  { type: 'section-intro', section: 'Section 2', title: 'Dual Antiplatelet Therapy (DAPT) in Minor Stroke', body: `
    <p>For patients with minor ischemic stroke who did not receive thrombolysis, DAPT with <strong>aspirin + clopidogrel</strong> has emerged as an evidence-based strategy to prevent early recurrence.</p>
    <div class="info-box"><strong>Key trials:</strong> POINT and CHANCE trials established DAPT superiority over aspirin alone in high-risk TIA and minor stroke.</div>
  `},

  { type: 'slide', section: 'Section 2', title: 'DAPT Criteria & Duration in Minor Stroke', body: `
    <p>In patients with <strong>minor noncardioembolic ischemic stroke (NIHSS ≤ 3)</strong> who did NOT receive IV alteplase:</p>
    <ul>
      <li>Start DAPT (aspirin + clopidogrel) <strong>within 24 hours</strong> of symptom onset</li>
      <li>Continue for <strong>21 days</strong> (standard duration)</li>
      <li>May extend to <strong>90 days</strong> if stroke is due to intracranial large artery stenosis</li>
    </ul>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Indication</th><th>DAPT Duration</th></tr></thead>
        <tbody>
          <tr><td>Minor stroke (NIHSS ≤3), no alteplase</td><td>21 days</td></tr>
          <tr><td>Intracranial large artery stenosis</td><td>Up to 90 days</td></tr>
          <tr><td>Post-alteplase</td><td>Not started (aspirin only after 24h)</td></tr>
        </tbody>
      </table>
    </div>
  `},

  { type: 'quiz', section: 'Section 2 — Quiz', question: 'A patient with an NIHSS score of 2 presents with minor noncardioembolic ischemic stroke and did NOT receive tPA. What is the recommended antiplatelet strategy?', options: [
    { text: 'Aspirin alone for 21 days', correct: false },
    { text: 'Aspirin + clopidogrel started within 24h, continued for 21 days', correct: true },
    { text: 'Aspirin + clopidogrel for 12 months', correct: false },
    { text: 'Clopidogrel monotherapy for 90 days', correct: false },
  ], explanation: 'Correct! DAPT (aspirin + clopidogrel) started within 24 hours and continued for 21 days is recommended for minor noncardioembolic ischemic stroke with NIHSS ≤3 when tPA was not given.' },

  { type: 'quiz', section: 'Section 2 — Quiz', question: 'When can DAPT duration be extended to 90 days after a minor stroke?', options: [
    { text: 'In all patients with NIHSS ≤3', correct: false },
    { text: 'When the patient also has atrial fibrillation', correct: false },
    { text: 'When the stroke is due to intracranial large artery stenosis', correct: true },
    { text: 'When the patient is intolerant to aspirin', correct: false },
  ], explanation: 'Correct! Extension to 90 days is specifically considered in cases of stroke secondary to intracranial large artery stenosis, given the higher recurrence risk in this subset.' },

  // ── SECTION 3: DAPT IN ACS ────────────────────

  { type: 'section-intro', section: 'Section 3', title: 'DAPT in Acute Coronary Syndrome (ACS)', body: `
    <p>Antiplatelet therapy after ACS — especially following PCI — requires balancing <strong>ischemic protection</strong> against <strong>bleeding risk</strong>. Strategies include default 12-month DAPT, de-escalation, and abbreviation.</p>
  `},

  { type: 'slide', section: 'Section 3', title: 'Default DAPT After PCI in ACS', body: `
    <p>Following PCI, the default regimen is:</p>
    <ul>
      <li>A <strong>potent P2Y12 inhibitor</strong> (prasugrel or ticagrelor) <strong>plus aspirin</strong></li>
      <li>Duration: <strong>12 months</strong>, irrespective of stent type</li>
      <li>Unless contraindications exist</li>
    </ul>
    <div class="warn-box">⚠️ Clopidogrel is used only when prasugrel/ticagrelor are contraindicated or not tolerated.</div>
  `},

  { type: 'slide', section: 'Section 3', title: 'DAPT De-escalation Strategies', body: `
    <p>In certain ACS patients, the default 12-month DAPT can be <strong>modified to reduce bleeding</strong>:</p>
    <ul>
      <li><strong>De-escalation:</strong> Switch from prasugrel/ticagrelor → clopidogrel (reduces bleeding, especially in HBR patients)</li>
      <li><strong>Abbreviated DAPT:</strong> Shorten to &lt;12 months, then monotherapy</li>
    </ul>
    <div class="info-box"><strong>In patients event-free after 3–6 months</strong> of DAPT and NOT high ischaemic risk → consider switching to <strong>single antiplatelet therapy</strong> (preferably a P2Y12 inhibitor).</div>
    <div class="warn-box">⚠️ De-escalation in the <strong>first 30 days</strong> after ACS is <strong>NOT recommended.</strong></div>
  `},

  { type: 'slide', section: 'Section 3', title: 'High Bleeding Risk (HBR) Patients', body: `
    <p>For patients identified as <strong>High Bleeding Risk (HBR)</strong>:</p>
    <ul>
      <li>Aspirin <em>or</em> P2Y12 monotherapy after <strong>1 month</strong> of DAPT may be considered</li>
      <li>If multiple HBR factors exist, DAT duration may be shortened to 6 months</li>
      <li>After 12 months: <strong>OAC monotherapy</strong> is recommended for most patients with AF</li>
    </ul>
    <div class="info-box"><strong>Summary of strategies:</strong> Abbreviated DAPT and de-escalation are <em>alternatives</em> to the 12-month default — driven by bleeding risk, not convenience.</div>
  `},

  { type: 'slide', section: 'Section 3', title: 'Triple Antithrombotic Therapy (TAT) in AF + ACS', body: `
    <p>For ACS patients with <strong>atrial fibrillation (AF)</strong> requiring oral anticoagulation:</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Phase</th><th>Strategy</th></tr></thead>
        <tbody>
          <tr><td>Up to 1 week</td><td>TAT: NOAC + aspirin + clopidogrel</td></tr>
          <tr><td>Up to 12 months</td><td>DAT: NOAC + clopidogrel (default)</td></tr>
          <tr><td>After 12 months</td><td>OAC monotherapy (stop antiplatelets)</td></tr>
        </tbody>
      </table>
    </div>
    <div class="info-box">DAT may be shortened to <strong>6 months</strong> by withdrawing antiplatelet therapy in multiple HBR patients. TAT prolonged up to 1 month for high ischaemic risk patients.</div>
  `},

  { type: 'quiz', section: 'Section 3 — Quiz', question: 'What is the DEFAULT antiplatelet regimen following PCI in ACS?', options: [
    { text: 'Aspirin alone for 12 months', correct: false },
    { text: 'Clopidogrel + aspirin for 6 months', correct: false },
    { text: 'Prasugrel or ticagrelor + aspirin for 12 months', correct: true },
    { text: 'Ticagrelor monotherapy for 12 months', correct: false },
  ], explanation: 'Correct! The default is a potent P2Y12 inhibitor (prasugrel or ticagrelor) plus aspirin for 12 months post-PCI, regardless of stent type, unless contraindications exist.' },

  { type: 'quiz', section: 'Section 3 — Quiz', question: 'When is de-escalation of P2Y12 therapy (e.g., prasugrel/ticagrelor → clopidogrel) NOT recommended?', options: [
    { text: 'In HBR patients after 3 months', correct: false },
    { text: 'In the first 30 days after an ACS event', correct: true },
    { text: 'After 6 months in low ischaemic risk patients', correct: false },
    { text: 'In patients who are event-free at 6 months', correct: false },
  ], explanation: 'Correct! De-escalation of antiplatelet therapy within the first 30 days post-ACS is not recommended due to the elevated ischaemic risk in the early period after the event.' },

  { type: 'quiz', section: 'Section 3 — Quiz', question: 'For an ACS patient with atrial fibrillation, what is the recommended strategy after 12 months of antithrombotic therapy?', options: [
    { text: 'Continue DAPT indefinitely', correct: false },
    { text: 'Switch to aspirin monotherapy', correct: false },
    { text: 'OAC monotherapy (stop antiplatelets)', correct: true },
    { text: 'Continue DAT (NOAC + clopidogrel)', correct: false },
  ], explanation: 'Correct! After 12 months, the recommendation is to stop antiplatelet therapy and continue with OAC monotherapy in most ACS patients with AF, balancing stroke prevention against bleeding risk.' },

];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let current = 0;
let quizAnswered = {};
let score = 0;
let quizTotal = 0;

function countQuizzes() {
  return slides.filter(s => s.type === 'quiz').length;
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function startCourse() {
  current = 0;
  quizAnswered = {};
  score = 0;
  quizTotal = countQuizzes();
  showScreen('course-screen');
  renderSlide();
}

function restartCourse() {
  showScreen('cover-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  // force re-animation
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function updateProgress() {
  const pct = Math.round((current / (slides.length - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

function renderSlide() {
  updateProgress();
  const s = slides[current];
  const card = document.getElementById('slide-card');

  let html = '';

  if (s.type === 'section-intro') {
    html = `
      <div class="section-tag">${s.section}</div>
      <h2>${s.title}</h2>
      ${s.body}
      ${navButtons()}
    `;
  } else if (s.type === 'slide') {
    html = `
      <div class="section-tag">${s.section}</div>
      <h2>${s.title}</h2>
      ${s.body}
      ${navButtons()}
    `;
  } else if (s.type === 'quiz') {
    const answered = quizAnswered[current] !== undefined;
    const optionsHTML = s.options.map((opt, i) => {
      let cls = '';
      if (answered) {
        if (opt.correct) cls = 'correct';
        else if (quizAnswered[current] === i) cls = 'wrong';
      }
      return `<button class="option-btn ${cls}" onclick="answerQuiz(${i})" ${answered ? 'disabled' : ''}>
        <span class="opt-letter">${String.fromCharCode(65+i)}</span>
        <span>${opt.text}</span>
      </button>`;
    }).join('');

    let feedbackHTML = '';
    if (answered) {
      const isCorrect = s.options[quizAnswered[current]].correct;
      feedbackHTML = `<div class="feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'} show">
        ${isCorrect ? '✅' : '❌'} ${s.explanation}
      </div>`;
    }

    html = `
      <div class="section-tag">${s.section}</div>
      <div class="quiz-q">${s.question}</div>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
      ${navButtons()}
    `;
  }

  card.innerHTML = html;
  // re-animate
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp .45s ease both';
}

function answerQuiz(i) {
  if (quizAnswered[current] !== undefined) return;
  quizAnswered[current] = i;
  if (slides[current].options[i].correct) score++;
  renderSlide();
}

function navButtons() {
  const s = slides[current];
  const isQuiz = s.type === 'quiz';
  const answered = quizAnswered[current] !== undefined;
  const isLast = current === slides.length - 1;
  const nextDisabled = (isQuiz && !answered) ? 'disabled' : '';

  const prevBtn = current > 0
    ? `<button class="btn btn-ghost" onclick="go(-1)">← Back</button>`
    : `<span></span>`;

  const nextBtn = isLast
    ? `<button class="btn btn-primary" onclick="showResults()" ${nextDisabled}>Finish ✓</button>`
    : `<button class="btn btn-primary" onclick="go(1)" ${nextDisabled}>Next →</button>`;

  const counter = `<span class="slide-counter">${current + 1} / ${slides.length}</span>`;

  return `<div class="nav-row">${prevBtn}${counter}${nextBtn}</div>`;
}

function go(dir) {
  current = Math.max(0, Math.min(slides.length - 1, current + dir));
  renderSlide();
}

function showResults() {
  const pct = Math.round((score / quizTotal) * 100);
  document.getElementById('score-num').textContent = pct + '%';
  const deg = (pct / 100) * 360;
  document.getElementById('score-ring').style.setProperty('--score-deg', deg + 'deg');
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-total').textContent = quizTotal;

  let title, msg;
  if (pct === 100) { title = '🏆 Perfect Score!'; msg = 'Outstanding! You have mastered antiplatelet therapy guidelines.'; }
  else if (pct >= 70) { title = '✅ Well Done!'; msg = 'Good grasp of the material. Review any missed questions before practice.'; }
  else { title = '📚 Keep Studying'; msg = 'Review the sections and try again. These guidelines are critical for patient safety.'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  // update progress to 100%
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-pct').textContent = '100%';

  showScreen('results-screen');
}
</script>
</body>
</html>
